<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>不規則動詞過去式互動測驗</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2430;
        --muted: #667085;
        --line: #d8e0eb;
        --paper: #ffffff;
        --soft: #f5f8fb;
        --blue: #2563eb;
        --blue-dark: #1e40af;
        --green: #16845b;
        --red: #c2413d;
        --amber: #b7791f;
        --shadow: 0 18px 48px rgba(32, 41, 57, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #eef3f8;
        color: var(--ink);
        font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        min-height: 100vh;
      }

      .side {
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 24px;
        background: #102238;
        color: #fff;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .brand p,
      .label,
      .stat-label,
      .review-title {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .brand p {
        color: #9fd4ff;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 30px;
        line-height: 1.18;
      }

      .student-card,
      .score-card,
      .question-card,
      .result-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .student-card,
      .score-card {
        padding: 18px;
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.16);
        box-shadow: none;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .field label {
        color: #d8e8f7;
        font-size: 13px;
        font-weight: 800;
      }

      .field input,
      .field select {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 0 12px;
        background: rgba(255, 255, 255, 0.95);
        color: var(--ink);
        outline: 0;
      }

      .field input:focus,
      .field select:focus,
      .answer-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
      }

      .side-actions,
      .actions {
        display: flex;
        gap: 10px;
      }

      .side-actions button,
      .actions button,
      .speaker {
        min-height: 42px;
        border-radius: 6px;
        padding: 0 14px;
        font-weight: 800;
      }

      .primary {
        background: var(--blue);
        color: #fff;
      }

      .primary:hover {
        background: var(--blue-dark);
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.11);
        color: #fff;
      }

      .light-secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
      }

      .score-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        padding: 12px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
      }

      .stat-value {
        margin-top: 4px;
        font-size: 28px;
        font-weight: 900;
      }

      .stat-label {
        color: #bad0e5;
      }

      .main {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .progress {
        width: 100%;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #d9e3ee;
      }

      .progress span {
        display: block;
        width: 0%;
        height: 100%;
        background: var(--green);
        transition: width 0.25s ease;
      }

      .question-card,
      .result-card {
        padding: 24px;
      }

      .question-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border-radius: 999px;
        padding: 0 12px;
        background: #e8f0ff;
        color: var(--blue-dark);
        font-size: 13px;
        font-weight: 900;
      }

      .verb {
        margin: 0 0 6px;
        font-size: 52px;
        line-height: 1;
      }

      .meaning {
        margin-bottom: 22px;
        color: var(--muted);
        font-size: 20px;
      }

      .answer-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .answer-input {
        width: 100%;
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 16px;
        font-size: 24px;
        outline: 0;
      }

      .speaker {
        border: 1px solid var(--line);
        background: var(--soft);
        color: var(--ink);
      }

      .feedback {
        min-height: 56px;
        margin-top: 16px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        font-size: 18px;
        line-height: 1.45;
      }

      .feedback.good {
        border-color: rgba(22, 132, 91, 0.35);
        background: #eaf8f1;
        color: var(--green);
      }

      .feedback.bad {
        border-color: rgba(194, 65, 61, 0.35);
        background: #fff1f0;
        color: var(--red);
      }

      .actions {
        justify-content: flex-end;
        margin-top: 20px;
      }

      .result-card {
        display: none;
      }

      .result-card.active {
        display: block;
      }

      .result-score {
        margin: 10px 0 16px;
        font-size: 44px;
        font-weight: 900;
      }

      .wrong-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 42px;
        margin: 12px 0 0;
      }

      .wrong-list span {
        border-radius: 999px;
        padding: 8px 12px;
        background: #fff1f0;
        color: var(--red);
        font-weight: 800;
      }

      .submit-status {
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      .setup-note {
        border-left: 4px solid var(--amber);
        padding: 12px 14px;
        background: #fff8e8;
        color: #62420f;
        line-height: 1.5;
      }

      @media (max-width: 860px) {
        .app {
          grid-template-columns: 1fr;
        }

        .side {
          padding: 20px;
        }

        .main {
          padding: 18px;
        }

        .topbar,
        .question-head,
        .answer-row {
          display: grid;
        }

        .verb {
          font-size: 42px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="brand">
          <p>GEPT Basic</p>
          <h1>不規則動詞過去式</h1>
        </div>

        <section class="student-card">
          <div class="field">
            <label for="studentName">Student name</label>
            <input id="studentName" autocomplete="name" placeholder="Type your name">
          </div>
          <div class="field">
            <label for="sectionSelect">Section tested</label>
            <select id="sectionSelect">
              <option value="Mixed 20">Mixed 20</option>
              <option value="AAA: no change">AAA: no change</option>
              <option value="ABB: same past forms">ABB: same past forms</option>
              <option value="ABC: three forms">ABC: three forms</option>
              <option value="All verbs">All verbs</option>
            </select>
          </div>
          <div class="side-actions">
            <button id="startBtn" class="primary" type="button">Start</button>
            <button id="resetBtn" class="secondary" type="button">Reset</button>
          </div>
        </section>

        <section class="score-card">
          <div class="score-grid">
            <div class="stat">
              <div class="stat-label">Question</div>
              <div id="questionStat" class="stat-value">0/20</div>
            </div>
            <div class="stat">
              <div class="stat-label">Correct</div>
              <div id="correctStat" class="stat-value">0</div>
            </div>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="topbar">
          <div>
            <p class="label">Type the simple past form</p>
            <h2 id="sectionTitle">Mixed 20</h2>
          </div>
          <div class="progress" aria-label="quiz progress"><span id="progressBar"></span></div>
        </div>

        <section class="question-card">
          <div class="question-head">
            <span id="questionPill" class="pill">Ready</span>
            <button id="speakBtn" class="speaker" type="button">Listen</button>
          </div>
          <h3 id="verbText" class="verb">Start the quiz</h3>
          <p id="meaningText" class="meaning">請輸入姓名，選擇測驗範圍，然後按 Start。</p>
          <div class="answer-row">
            <input id="answerInput" class="answer-input" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="past tense">
            <button id="checkBtn" class="primary" type="button">Check</button>
          </div>
          <div id="feedbackBox" class="feedback">每題輸入英文過去式，例如: go -> went。</div>
          <div class="actions">
            <button id="showBtn" class="light-secondary" type="button">Show answer</button>
            <button id="nextBtn" class="primary" type="button">Next</button>
          </div>
        </section>

        <section id="resultCard" class="result-card">
          <p class="label">Result</p>
          <h2>測驗完成</h2>
          <div id="resultScore" class="result-score">0%</div>
          <p id="resultDetail"></p>
          <p class="review-title">Wrong verbs</p>
          <div id="wrongList" class="wrong-list"></div>
          <div id="setupNote" class="setup-note"></div>
          <div class="actions">
            <button id="submitBtn" class="primary" type="button">Submit to spreadsheet</button>
            <button id="againBtn" class="light-secondary" type="button">Try again</button>
          </div>
          <p id="submitStatus" class="submit-status"></p>
        </section>
      </main>
    </div>

    <script>
      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOPob_ZlNbc2sPNETVklnYGUEaqyTTMl5ylSqYjdjhdFeWxQQ3_tTte2moPdyNCuCinA/exec";
      const SHEET_ID = "1OBjL_J5zE52ybzCbWwldXDjWyRoTl3gl1JGBzaEVfSk";

      const verbs = [
        ["cost", "cost", "花費", "AAA"], ["cut", "cut", "切", "AAA"], ["hit", "hit", "打、撞", "AAA"],
        ["hurt", "hurt", "受傷", "AAA"], ["let", "let", "讓", "AAA"], ["put", "put", "放", "AAA"],
        ["read", "read", "閱讀", "AAA"], ["set", "set", "設置", "AAA"], ["shut", "shut", "關上", "AAA"],

        ["bring", "brought", "帶來", "ABB"], ["build", "built", "建造", "ABB"], ["buy", "bought", "買", "ABB"],
        ["catch", "caught", "抓住", "ABB"], ["dig", "dug", "挖", "ABB"], ["feed", "fed", "餵食", "ABB"],
        ["feel", "felt", "感覺", "ABB"], ["fight", "fought", "打架", "ABB"], ["find", "found", "找到", "ABB"],
        ["get", "got", "得到", "ABB"], ["have", "had", "有、吃", "ABB"], ["hear", "heard", "聽見", "ABB"],
        ["hold", "held", "握住", "ABB"], ["keep", "kept", "保持", "ABB"], ["leave", "left", "離開", "ABB"],
        ["lend", "lent", "借出", "ABB"], ["lose", "lost", "失去", "ABB"], ["make", "made", "製作", "ABB"],
        ["meet", "met", "遇見", "ABB"], ["pay", "paid", "付錢", "ABB"], ["say", "said", "說", "ABB"],
        ["sell", "sold", "賣", "ABB"], ["send", "sent", "寄送", "ABB"], ["sit", "sat", "坐", "ABB"],
        ["sleep", "slept", "睡覺", "ABB"], ["spend", "spent", "花費時間", "ABB"], ["stand", "stood", "站", "ABB"],
        ["teach", "taught", "教", "ABB"], ["tell", "told", "告訴", "ABB"], ["think", "thought", "想、認為", "ABB"],
        ["understand", "understood", "了解", "ABB"], ["win", "won", "贏", "ABB"],

        ["be", "was/were", "是", "ABC"], ["begin", "began", "開始", "ABC"], ["bite", "bit", "咬", "ABC"],
        ["blow", "blew", "吹", "ABC"], ["break", "broke", "打破", "ABC"], ["choose", "chose", "選擇", "ABC"],
        ["come", "came", "來", "ABC"], ["do", "did", "做", "ABC"], ["draw", "drew", "畫", "ABC"],
        ["drink", "drank", "喝", "ABC"], ["drive", "drove", "開車", "ABC"], ["eat", "ate", "吃", "ABC"],
        ["fall", "fell", "掉落", "ABC"], ["fly", "flew", "飛", "ABC"], ["forget", "forgot", "忘記", "ABC"],
        ["give", "gave", "給", "ABC"], ["go", "went", "去", "ABC"], ["grow", "grew", "成長", "ABC"],
        ["hide", "hid", "躲藏", "ABC"], ["know", "knew", "知道", "ABC"], ["ride", "rode", "騎", "ABC"],
        ["ring", "rang", "響", "ABC"], ["rise", "rose", "升起", "ABC"], ["run", "ran", "跑", "ABC"],
        ["see", "saw", "看見", "ABC"], ["shake", "shook", "搖晃", "ABC"], ["sing", "sang", "唱", "ABC"],
        ["speak", "spoke", "說話", "ABC"], ["swim", "swam", "游泳", "ABC"], ["take", "took", "拿、帶", "ABC"],
        ["throw", "threw", "丟", "ABC"], ["wake", "woke", "醒來", "ABC"], ["wear", "wore", "穿", "ABC"],
        ["write", "wrote", "寫", "ABC"]
      ].map(([base, past, zh, group]) => ({ base, past, zh, group }));

      const state = {
        questions: [],
        index: 0,
        correct: 0,
        checked: false,
        answers: [],
        finished: false
      };

      const $ = (id) => document.getElementById(id);
      const normalize = (value) => value.trim().toLowerCase().replace(/\s+/g, "");

      function shuffle(items) {
        return [...items].sort(() => Math.random() - 0.5);
      }

      function pickQuestions(section) {
        let pool = verbs;
        if (section.includes("AAA")) pool = verbs.filter((v) => v.group === "AAA");
        if (section.includes("ABB")) pool = verbs.filter((v) => v.group === "ABB");
        if (section.includes("ABC")) pool = verbs.filter((v) => v.group === "ABC");
        const limit = section === "All verbs" ? pool.length : Math.min(20, pool.length);
        return shuffle(pool).slice(0, limit);
      }

      function updateStats() {
        const total = state.questions.length || 20;
        $("questionStat").textContent = `${Math.min(state.index + 1, total)}/${total}`;
        $("correctStat").textContent = state.correct;
        $("progressBar").style.width = `${state.questions.length ? (state.index / state.questions.length) * 100 : 0}%`;
      }

      function renderQuestion() {
        const current = state.questions[state.index];
        if (!current) return;
        state.checked = false;
        $("resultCard").classList.remove("active");
        $("questionPill").textContent = `Question ${state.index + 1} of ${state.questions.length}`;
        $("verbText").textContent = current.base;
        $("meaningText").textContent = `${current.zh} | Group: ${current.group}`;
        $("answerInput").value = "";
        $("answerInput").disabled = false;
        $("feedbackBox").className = "feedback";
        $("feedbackBox").textContent = "Type the simple past tense, then press Enter or Check.";
        $("answerInput").focus();
        updateStats();
      }

      function startQuiz() {
        const name = $("studentName").value.trim();
        if (!name) {
          $("feedbackBox").className = "feedback bad";
          $("feedbackBox").textContent = "Please type your name first.";
          $("studentName").focus();
          return;
        }
        const section = $("sectionSelect").value;
        state.questions = pickQuestions(section);
        state.index = 0;
        state.correct = 0;
        state.checked = false;
        state.answers = [];
        state.finished = false;
        $("sectionTitle").textContent = section;
        renderQuestion();
      }

      function acceptedAnswers(current) {
        if (current.base === "be") return ["was", "were", "was/were", "waswere"];
        return current.past.split("/").map(normalize);
      }

      function checkAnswer(showOnly = false) {
        if (!state.questions.length || state.finished) return;
        const current = state.questions[state.index];
        const answer = $("answerInput").value;
        const correct = acceptedAnswers(current).includes(normalize(answer));
        if (!state.checked && !showOnly) {
          state.answers.push({ ...current, answer, correct });
          if (correct) state.correct += 1;
        }
        if (showOnly && !state.checked) {
          state.answers.push({ ...current, answer: "(shown)", correct: false });
        }
        state.checked = true;
        $("answerInput").disabled = true;
        $("feedbackBox").className = correct && !showOnly ? "feedback good" : "feedback bad";
        $("feedbackBox").textContent = correct && !showOnly
          ? `Correct: ${current.base} -> ${current.past}`
          : `Answer: ${current.base} -> ${current.past}`;
        updateStats();
      }

      function nextQuestion() {
        if (!state.questions.length || state.finished) return;
        if (!state.checked) checkAnswer(false);
        if (state.index < state.questions.length - 1) {
          state.index += 1;
          renderQuestion();
        } else {
          finishQuiz();
        }
      }

      function finishQuiz() {
        state.finished = true;
        $("progressBar").style.width = "100%";
        $("questionPill").textContent = "Finished";
        $("answerInput").disabled = true;
        const percent = Math.round((state.correct / state.questions.length) * 100);
        const wrong = state.answers.filter((item) => !item.correct);
        $("resultScore").textContent = `${percent}%`;
        $("resultDetail").textContent = `${$("studentName").value.trim()} got ${state.correct} out of ${state.questions.length} correct.`;
        $("wrongList").innerHTML = wrong.length
          ? wrong.map((item) => `<span>${item.base} -> ${item.past}</span>`).join("")
          : "<span style=\"background:#eaf8f1;color:#16845b\">All correct</span>";
        $("setupNote").textContent = APPS_SCRIPT_URL
          ? `Ready to submit to spreadsheet ${SHEET_ID}.`
          : "Spreadsheet submission needs one setup step: deploy irregular-verbs-past-apps-script.gs, then paste its Web App URL into APPS_SCRIPT_URL in this HTML file.";
        $("submitStatus").textContent = "";
        $("resultCard").classList.add("active");
      }

      function speakCurrent() {
        const current = state.questions[state.index];
        if (!current || !("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(`${current.base}. Past tense.`);
        utterance.lang = "en-US";
        utterance.rate = 0.82;
        window.speechSynthesis.speak(utterance);
      }

      async function submitResult() {
        if (!state.finished) return;
        const percent = Math.round((state.correct / state.questions.length) * 100);
        const wrongVerbs = state.answers
          .filter((item) => !item.correct)
          .map((item) => `${item.base}-${item.past}`)
          .join(", ");
        const payload = {
          studentName: $("studentName").value.trim(),
          sectionTested: $("sectionSelect").value,
          percentage: `${percent}%`,
          wrongVerbs
        };

        if (!APPS_SCRIPT_URL) {
          $("submitStatus").textContent = "Not submitted yet: paste your deployed Google Apps Script Web App URL into APPS_SCRIPT_URL.";
          return;
        }

        $("submitStatus").textContent = "Submitting...";
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });
          $("submitStatus").textContent = "Submitted. Please check the quiz result tab in the spreadsheet.";
        } catch (error) {
          $("submitStatus").textContent = "Submission failed. Check the Apps Script deployment URL and permissions.";
        }
      }

      $("startBtn").addEventListener("click", startQuiz);
      $("resetBtn").addEventListener("click", () => location.reload());
      $("checkBtn").addEventListener("click", () => checkAnswer(false));
      $("showBtn").addEventListener("click", () => checkAnswer(true));
      $("nextBtn").addEventListener("click", nextQuestion);
      $("againBtn").addEventListener("click", startQuiz);
      $("submitBtn").addEventListener("click", submitResult);
      $("speakBtn").addEventListener("click", speakCurrent);
      $("answerInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          state.checked ? nextQuestion() : checkAnswer(false);
        }
      });
    </script>
  </body>
</html>
